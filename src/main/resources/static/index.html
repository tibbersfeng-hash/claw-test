<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Test - 任务管理</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .intro-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            overflow: hidden;
        }

        .intro-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #solarCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .intro-text {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 20px;
        }

        .intro-title {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeIn 0.8s ease forwards;
            animation-delay: 1.5s;
            text-shadow: 0 0 30px rgba(255, 200, 100, 0.3);
        }

        .intro-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0;
            animation: textFadeIn 0.8s ease forwards;
            animation-delay: 1.8s;
        }

        .progress-track {
            margin-top: 32px;
            width: 160px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
            overflow: hidden;
            opacity: 0;
            animation: textFadeIn 0.5s ease forwards;
            animation-delay: 2s;
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 1px;
            animation: progressRun 2.5s ease forwards;
            animation-delay: 2.2s;
        }

        @keyframes textFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes progressRun {
            to {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .intro-title {
                font-size: 1.5rem;
            }
            .intro-subtitle {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="intro-container" id="intro">
        <canvas id="solarCanvas"></canvas>
        <div class="intro-text">
            <h1 class="intro-title">Claw Test</h1>
            <p class="intro-subtitle">任务管理系统</p>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('solarCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小
        function resize() {
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.6;
            canvas.width = size;
            canvas.height = size;
        }
        resize();
        window.addEventListener('resize', resize);

        // 行星数据
        const planets = [
            { name: 'Mercury', orbit: 0.15, speed: 0.04, size: 3, color: '#b5b5b5' },
            { name: 'Venus', orbit: 0.22, speed: 0.03, size: 5, color: '#e6c87a' },
            { name: 'Earth', orbit: 0.30, speed: 0.02, size: 5, color: '#6b93d6' },
            { name: 'Mars', orbit: 0.38, speed: 0.016, size: 4, color: '#c1440e' },
            { name: 'Jupiter', orbit: 0.50, speed: 0.008, size: 12, color: '#d8ca9d' },
            { name: 'Saturn', orbit: 0.62, speed: 0.006, size: 10, color: '#f4d59e', ring: true },
            { name: 'Uranus', orbit: 0.74, speed: 0.004, size: 7, color: '#d1e7e7' },
            { name: 'Neptune', orbit: 0.86, speed: 0.003, size: 7, color: '#5b5ddf' }
        ];

        let time = 0;
        const centerX = () => canvas.width / 2;
        const centerY = () => canvas.height / 2;

        // 绘制龙虾（中心）
        function drawSun() {
            const cx = centerX();
            const cy = centerY();
            const scale = canvas.width * 0.003;

            ctx.save();
            ctx.translate(cx, cy);

            // 光晕效果
            const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, scale * 30);
            glow.addColorStop(0, 'rgba(255, 100, 50, 0.4)');
            glow.addColorStop(0.5, 'rgba(255, 80, 30, 0.15)');
            glow.addColorStop(1, 'rgba(255, 50, 20, 0)');
            ctx.beginPath();
            ctx.arc(0, 0, scale * 30, 0, Math.PI * 2);
            ctx.fillStyle = glow;
            ctx.fill();

            // 龙虾身体颜色
            const bodyColor = '#c41e3a';
            const darkBodyColor = '#8b0000';
            const lightBodyColor = '#ff6b6b';

            // 尾巴扇形
            ctx.beginPath();
            ctx.moveTo(0, scale * 8);
            ctx.quadraticCurveTo(-scale * 12, scale * 18, -scale * 8, scale * 22);
            ctx.lineTo(0, scale * 16);
            ctx.lineTo(scale * 8, scale * 22);
            ctx.quadraticCurveTo(scale * 12, scale * 18, 0, scale * 8);
            ctx.fillStyle = darkBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 身体
            ctx.beginPath();
            ctx.ellipse(0, scale * 2, scale * 10, scale * 12, 0, 0, Math.PI * 2);
            const bodyGrad = ctx.createLinearGradient(-scale * 10, 0, scale * 10, 0);
            bodyGrad.addColorStop(0, darkBodyColor);
            bodyGrad.addColorStop(0.5, bodyColor);
            bodyGrad.addColorStop(1, darkBodyColor);
            ctx.fillStyle = bodyGrad;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 身体纹理线
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(-scale * 7, scale * i * 3);
                ctx.quadraticCurveTo(0, scale * i * 3 - scale, scale * 7, scale * i * 3);
                ctx.strokeStyle = 'rgba(90, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 头部
            ctx.beginPath();
            ctx.ellipse(0, -scale * 8, scale * 8, scale * 6, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 眼睛
            const eyeY = -scale * 10;
            // 左眼
            ctx.beginPath();
            ctx.arc(-scale * 4, eyeY, scale * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-scale * 4, eyeY, scale * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            // 右眼
            ctx.beginPath();
            ctx.arc(scale * 4, eyeY, scale * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(scale * 4, eyeY, scale * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // 触角
            ctx.beginPath();
            ctx.moveTo(-scale * 2, -scale * 12);
            ctx.quadraticCurveTo(-scale * 15, -scale * 28, -scale * 20, -scale * 35);
            ctx.strokeStyle = bodyColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(scale * 2, -scale * 12);
            ctx.quadraticCurveTo(scale * 15, -scale * 28, scale * 20, -scale * 35);
            ctx.stroke();

            // 左钳子
            ctx.save();
            ctx.translate(-scale * 12, -scale * 4);
            ctx.rotate(-0.3 + Math.sin(time * 0.05) * 0.1);
            // 钳臂
            ctx.beginPath();
            ctx.ellipse(0, 0, scale * 6, scale * 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 钳子
            ctx.beginPath();
            ctx.moveTo(-scale * 4, -scale * 3);
            ctx.lineTo(-scale * 10, -scale * 8);
            ctx.lineTo(-scale * 6, -scale * 3);
            ctx.lineTo(-scale * 10, scale * 2);
            ctx.lineTo(-scale * 4, scale * 3);
            ctx.closePath();
            ctx.fillStyle = lightBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // 右钳子
            ctx.save();
            ctx.translate(scale * 12, -scale * 4);
            ctx.rotate(0.3 - Math.sin(time * 0.05) * 0.1);
            // 钳臂
            ctx.beginPath();
            ctx.ellipse(0, 0, scale * 6, scale * 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 钳子
            ctx.beginPath();
            ctx.moveTo(scale * 4, -scale * 3);
            ctx.lineTo(scale * 10, -scale * 8);
            ctx.lineTo(scale * 6, -scale * 3);
            ctx.lineTo(scale * 10, scale * 2);
            ctx.lineTo(scale * 4, scale * 3);
            ctx.closePath();
            ctx.fillStyle = lightBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // 腿
            const legAngles = [0.3, 0.8, 1.3, 1.8];
            legAngles.forEach((angle, i) => {
                const legY = scale * i * 3;
                // 左腿
                ctx.beginPath();
                ctx.moveTo(-scale * 8, legY);
                ctx.lineTo(-scale * 16, legY + scale * 6);
                ctx.strokeStyle = bodyColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                // 右腿
                ctx.beginPath();
                ctx.moveTo(scale * 8, legY);
                ctx.lineTo(scale * 16, legY + scale * 6);
                ctx.stroke();
            });

            ctx.restore();
        }

        // 绘制轨道
        function drawOrbits() {
            const cx = centerX();
            const cy = centerY();
            const baseRadius = canvas.width * 0.06;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;

            planets.forEach(planet => {
                const orbitRadius = baseRadius + canvas.width * planet.orbit;
                ctx.beginPath();
                ctx.arc(cx, cy, orbitRadius, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        // 绘制行星
        function drawPlanets() {
            const cx = centerX();
            const cy = centerY();
            const baseRadius = canvas.width * 0.06;

            planets.forEach(planet => {
                const orbitRadius = baseRadius + canvas.width * planet.orbit;
                const angle = time * planet.speed;
                const x = cx + Math.cos(angle) * orbitRadius;
                const y = cy + Math.sin(angle) * orbitRadius;

                // 行星阴影/光晕
                const glow = ctx.createRadialGradient(x, y, 0, x, y, planet.size * 2);
                glow.addColorStop(0, planet.color);
                glow.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(x, y, planet.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                // 行星本体
                ctx.beginPath();
                ctx.arc(x, y, planet.size, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();

                // 土星环
                if (planet.ring) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, planet.size * 2, planet.size * 0.5, Math.PI * 0.1, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(244, 213, 158, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        // 绘制星空背景
        const stars = [];
        function initStars() {
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.3
                });
            }
        }
        initStars();

        function drawStars() {
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
            });
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();
            drawOrbits();
            drawSun();
            drawPlanets();
            time += 1;
            requestAnimationFrame(animate);
        }

        animate();

        // 4秒后跳转
        const intro = document.getElementById('intro');
        setTimeout(() => {
            intro.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = '/tasks.html';
            }, 800);
        }, 4000);
    </script>
</body>
</html>
