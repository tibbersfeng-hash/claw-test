<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Test - 任务管理</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .intro-container {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            overflow: hidden;
        }

        .intro-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #solarCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .intro-text {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .intro-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeIn 0.8s ease forwards;
            animation-delay: 1.5s;
            text-shadow: 0 0 30px rgba(255, 200, 100, 0.3);
        }

        .intro-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-top: 10px;
            opacity: 0;
            animation: textFadeIn 0.8s ease forwards;
            animation-delay: 1.8s;
        }

        .progress-track {
            margin-top: 40px;
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
            overflow: hidden;
            opacity: 0;
            animation: textFadeIn 0.5s ease forwards;
            animation-delay: 2s;
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 1px;
            animation: progressRun 2.5s ease forwards;
            animation-delay: 2.2s;
        }

        @keyframes textFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes progressRun {
            to {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .intro-title {
                font-size: 1.75rem;
            }
            .intro-subtitle {
                font-size: 0.9rem;
            }
            .progress-track {
                width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="intro-container" id="intro">
        <canvas id="solarCanvas"></canvas>
        <div class="intro-text">
            <h1 class="intro-title">Claw Test</h1>
            <p class="intro-subtitle">任务管理系统</p>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('solarCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布为全屏
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 计算星系中心位置（偏左上一点，给文字留空间）
        const centerX = () => canvas.width * 0.5;
        const centerY = () => canvas.height * 0.45;

        // 行星数据 - 初始角度分散，速度加快
        const planets = [
            { name: 'Mercury', orbit: 0.08, speed: 0.12, size: 4, color: '#b5b5b5', angle0: 0 },
            { name: 'Venus', orbit: 0.12, speed: 0.09, size: 6, color: '#e6c87a', angle0: Math.PI * 0.7 },
            { name: 'Earth', orbit: 0.17, speed: 0.07, size: 7, color: '#6b93d6', angle0: Math.PI * 1.3 },
            { name: 'Mars', orbit: 0.22, speed: 0.06, size: 5, color: '#c1440e', angle0: Math.PI * 0.3 },
            { name: 'Jupiter', orbit: 0.30, speed: 0.04, size: 16, color: '#d8ca9d', angle0: Math.PI * 1.6 },
            { name: 'Saturn', orbit: 0.38, speed: 0.03, size: 14, color: '#f4d59e', ring: true, angle0: Math.PI * 0.9 },
            { name: 'Uranus', orbit: 0.44, speed: 0.025, size: 10, color: '#d1e7e7', angle0: Math.PI * 1.1 },
            { name: 'Neptune', orbit: 0.48, speed: 0.02, size: 10, color: '#5b5ddf', angle0: Math.PI * 0.5 }
        ];

        let time = 0;

        // 绘制深空背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createRadialGradient(
                centerX(), centerY(), 0,
                centerX(), centerY(), Math.max(canvas.width, canvas.height) * 0.7
            );
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#050510');
            gradient.addColorStop(1, '#000005');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星云效果
            drawNebula();
        }

        // 绘制星云
        function drawNebula() {
            const cx = centerX();
            const cy = centerY();

            // 紫色星云
            ctx.beginPath();
            const nebula1 = ctx.createRadialGradient(cx - 200, cy + 100, 0, cx - 200, cy + 100, 300);
            nebula1.addColorStop(0, 'rgba(100, 50, 150, 0.15)');
            nebula1.addColorStop(0.5, 'rgba(80, 30, 120, 0.08)');
            nebula1.addColorStop(1, 'transparent');
            ctx.fillStyle = nebula1;
            ctx.arc(cx - 200, cy + 100, 300, 0, Math.PI * 2);
            ctx.fill();

            // 蓝色星云
            ctx.beginPath();
            const nebula2 = ctx.createRadialGradient(cx + 150, cy - 80, 0, cx + 150, cy - 80, 250);
            nebula2.addColorStop(0, 'rgba(50, 80, 150, 0.12)');
            nebula2.addColorStop(0.5, 'rgba(30, 60, 120, 0.06)');
            nebula2.addColorStop(1, 'transparent');
            ctx.fillStyle = nebula2;
            ctx.arc(cx + 150, cy - 80, 250, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制星空背景 - 更多星星
        const stars = [];
        function initStars() {
            stars.length = 0;
            const count = Math.floor((canvas.width * canvas.height) / 3000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.6 + 0.2,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.02 + 0.01
                });
            }
        }
        initStars();
        window.addEventListener('resize', initStars);

        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(star.twinkle + time * star.twinkleSpeed) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha * twinkle})`;
                ctx.fill();
            });
        }

        // 绘制龙虾（中心）
        function drawLobster() {
            const cx = centerX();
            const cy = centerY();
            // 龙虾大小基于屏幕较小的边
            const scale = Math.min(canvas.width, canvas.height) * 0.0025;

            ctx.save();
            ctx.translate(cx, cy);

            // 光晕效果
            const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, scale * 40);
            glow.addColorStop(0, 'rgba(255, 100, 50, 0.35)');
            glow.addColorStop(0.5, 'rgba(255, 80, 30, 0.12)');
            glow.addColorStop(1, 'rgba(255, 50, 20, 0)');
            ctx.beginPath();
            ctx.arc(0, 0, scale * 40, 0, Math.PI * 2);
            ctx.fillStyle = glow;
            ctx.fill();

            // 龙虾身体颜色
            const bodyColor = '#c41e3a';
            const darkBodyColor = '#8b0000';
            const lightBodyColor = '#ff6b6b';

            // 尾巴扇形
            ctx.beginPath();
            ctx.moveTo(0, scale * 8);
            ctx.quadraticCurveTo(-scale * 12, scale * 18, -scale * 8, scale * 22);
            ctx.lineTo(0, scale * 16);
            ctx.lineTo(scale * 8, scale * 22);
            ctx.quadraticCurveTo(scale * 12, scale * 18, 0, scale * 8);
            ctx.fillStyle = darkBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 身体
            ctx.beginPath();
            ctx.ellipse(0, scale * 2, scale * 10, scale * 12, 0, 0, Math.PI * 2);
            const bodyGrad = ctx.createLinearGradient(-scale * 10, 0, scale * 10, 0);
            bodyGrad.addColorStop(0, darkBodyColor);
            bodyGrad.addColorStop(0.5, bodyColor);
            bodyGrad.addColorStop(1, darkBodyColor);
            ctx.fillStyle = bodyGrad;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 身体纹理线
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(-scale * 7, scale * i * 3);
                ctx.quadraticCurveTo(0, scale * i * 3 - scale, scale * 7, scale * i * 3);
                ctx.strokeStyle = 'rgba(90, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 头部
            ctx.beginPath();
            ctx.ellipse(0, -scale * 8, scale * 8, scale * 6, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 眼睛
            const eyeY = -scale * 10;
            ctx.beginPath();
            ctx.arc(-scale * 4, eyeY, scale * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-scale * 4, eyeY, scale * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(scale * 4, eyeY, scale * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(scale * 4, eyeY, scale * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // 触角
            ctx.beginPath();
            ctx.moveTo(-scale * 2, -scale * 12);
            ctx.quadraticCurveTo(-scale * 15, -scale * 28, -scale * 20, -scale * 35);
            ctx.strokeStyle = bodyColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(scale * 2, -scale * 12);
            ctx.quadraticCurveTo(scale * 15, -scale * 28, scale * 20, -scale * 35);
            ctx.stroke();

            // 左钳子
            ctx.save();
            ctx.translate(-scale * 12, -scale * 4);
            ctx.rotate(-0.3 + Math.sin(time * 0.05) * 0.1);
            ctx.beginPath();
            ctx.ellipse(0, 0, scale * 6, scale * 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-scale * 4, -scale * 3);
            ctx.lineTo(-scale * 10, -scale * 8);
            ctx.lineTo(-scale * 6, -scale * 3);
            ctx.lineTo(-scale * 10, scale * 2);
            ctx.lineTo(-scale * 4, scale * 3);
            ctx.closePath();
            ctx.fillStyle = lightBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // 右钳子
            ctx.save();
            ctx.translate(scale * 12, -scale * 4);
            ctx.rotate(0.3 - Math.sin(time * 0.05) * 0.1);
            ctx.beginPath();
            ctx.ellipse(0, 0, scale * 6, scale * 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = bodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(scale * 4, -scale * 3);
            ctx.lineTo(scale * 10, -scale * 8);
            ctx.lineTo(scale * 6, -scale * 3);
            ctx.lineTo(scale * 10, scale * 2);
            ctx.lineTo(scale * 4, scale * 3);
            ctx.closePath();
            ctx.fillStyle = lightBodyColor;
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // 腿
            for (let i = 0; i < 4; i++) {
                const legY = scale * i * 3;
                ctx.beginPath();
                ctx.moveTo(-scale * 8, legY);
                ctx.lineTo(-scale * 16, legY + scale * 6);
                ctx.strokeStyle = bodyColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(scale * 8, legY);
                ctx.lineTo(scale * 16, legY + scale * 6);
                ctx.stroke();
            }

            ctx.restore();
        }

        // 绘制轨道
        function drawOrbits() {
            const cx = centerX();
            const cy = centerY();
            const minDim = Math.min(canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 1;

            planets.forEach(planet => {
                const orbitRadius = minDim * planet.orbit;
                ctx.beginPath();
                ctx.arc(cx, cy, orbitRadius, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        // 绘制行星
        function drawPlanets() {
            const cx = centerX();
            const cy = centerY();
            const minDim = Math.min(canvas.width, canvas.height);

            planets.forEach(planet => {
                const orbitRadius = minDim * planet.orbit;
                const angle = planet.angle0 + time * planet.speed;
                const x = cx + Math.cos(angle) * orbitRadius;
                const y = cy + Math.sin(angle) * orbitRadius;

                // 行星光晕
                const glow = ctx.createRadialGradient(x, y, 0, x, y, planet.size * 2.5);
                glow.addColorStop(0, planet.color);
                glow.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(x, y, planet.size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                // 行星本体
                ctx.beginPath();
                ctx.arc(x, y, planet.size, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();

                // 土星环
                if (planet.ring) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, planet.size * 2, planet.size * 0.5, Math.PI * 0.1, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(244, 213, 158, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        // 动画循环
        function animate() {
            drawBackground();
            drawStars();
            drawOrbits();
            drawLobster();
            drawPlanets();
            time += 1;
            requestAnimationFrame(animate);
        }

        animate();

        // 4秒后跳转
        const intro = document.getElementById('intro');
        setTimeout(() => {
            intro.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = '/tasks.html';
            }, 800);
        }, 4000);
    </script>
</body>
</html>
