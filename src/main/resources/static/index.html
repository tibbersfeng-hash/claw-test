<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Test - 任务管理</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* 开场动画容器 */
        .intro-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .intro-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Logo 动画 */
        .intro-logo {
            font-size: 5rem;
            animation: logoPulse 1.5s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        /* 标题动画 */
        .intro-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: titleFadeIn 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes titleFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 副标题 */
        .intro-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.125rem;
            margin-top: 12px;
            opacity: 0;
            animation: titleFadeIn 0.8s ease forwards;
            animation-delay: 0.6s;
        }

        /* 进度条容器 */
        .progress-container {
            margin-top: 48px;
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            animation: titleFadeIn 0.5s ease forwards;
            animation-delay: 0.9s;
        }

        .progress-bar {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 0;
            animation: progressFill 1.5s ease forwards;
            animation-delay: 1.2s;
        }

        @keyframes progressFill {
            to {
                width: 100%;
            }
        }

        /* 加载文字 */
        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
            margin-top: 16px;
            opacity: 0;
            animation: titleFadeIn 0.5s ease forwards;
            animation-delay: 1s;
        }

        /* 装饰元素 */
        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .decoration-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .decoration-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: -50px;
            right: -50px;
            animation-delay: -2s;
        }

        .decoration-circle:nth-child(3) {
            width: 150px;
            height: 150px;
            top: 50%;
            right: 10%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .intro-logo {
                font-size: 3.5rem;
            }
            .intro-title {
                font-size: 1.75rem;
            }
            .intro-subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 开场动画 -->
    <div class="intro-container" id="introContainer">
        <!-- 装饰圆圈 -->
        <div class="decoration-circle"></div>
        <div class="decoration-circle"></div>
        <div class="decoration-circle"></div>

        <!-- 主内容 -->
        <div class="intro-logo">🦀</div>
        <h1 class="intro-title">Claw Test</h1>
        <p class="intro-subtitle">任务管理系统</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <p class="loading-text">正在加载...</p>
    </div>

    <script>
        // 动画结束后跳转
        const introContainer = document.getElementById('introContainer');
        const totalAnimationTime = 3000; // 3秒后开始淡出

        setTimeout(() => {
            introContainer.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = '/tasks.html';
            }, 500);
        }, totalAnimationTime);
    </script>
</body>
</html>
